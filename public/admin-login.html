<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Admin - Academy Z</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Fira Code', 'JetBrains Mono', 'Ubuntu Mono', monospace;
        }

        body {
            background-color: #0b0f14;
            color: #e5e7eb;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image:
                linear-gradient(rgba(0, 255, 136, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 136, 0.03) 1px, transparent 1px);
            background-size: 20px 20px;
        }

        .login-container {
            background: #0e141a;
            border: 2px solid #1f2937;
            border-radius: 12px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo h1 {
            color: #00ff88;
            font-size: 28px;
            margin-bottom: 5px;
        }

        .logo p {
            color: #94a3b8;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #94a3b8;
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            background: #0b0f14;
            border: 1px solid #1f2937;
            border-radius: 6px;
            color: #e5e7eb;
            font-family: inherit;
            font-size: 14px;
        }

        .form-group input:focus {
            outline: none;
            border-color: #00ff88;
        }

        .btn {
            width: 100%;
            padding: 12px;
            background: #00ff88;
            color: #0b0f14;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .btn:hover {
            background: #00cc6a;
        }

        .btn:disabled {
            background: #334155;
            cursor: not-allowed;
        }

        .alert {
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }

        .alert-error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid #ef4444;
            color: #ef4444;
        }

        .alert-success {
            background: rgba(0, 255, 136, 0.1);
            border: 1px solid #00ff88;
            color: #00ff88;
        }

        .back-link {
            text-align: center;
            margin-top: 20px;
        }

        .back-link a {
            color: #4fd1c5;
            text-decoration: none;
            font-size: 14px;
        }

        .back-link a:hover {
            text-decoration: underline;
        }

        .admin-badge {
            display: inline-block;
            background: #fbbf24;
            color: #0b0f14;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: bold;
            margin-left: 10px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <h1>🔧 Academy Z</h1>
            <p>Painel de Administração <span class="admin-badge">ADMIN</span></p>
        </div>

        <div id="alertBox" class="alert"></div>

        <form id="loginForm">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required placeholder="seu-email@example.com">
            </div>

            <div class="form-group">
                <label for="password">Senha</label>
                <input type="password" id="password" name="password" required placeholder="••••••••">
            </div>

            <button type="submit" class="btn" id="loginBtn">
                🔓 Entrar como Admin
            </button>
        </form>

        <div class="back-link">
            <a href="/">← Voltar para o site</a>
        </div>
    </div>

    <script>
        const API_BASE = '/api';

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const loginBtn = document.getElementById('loginBtn');
            const alertBox = document.getElementById('alertBox');

            // Desabilitar botão
            loginBtn.disabled = true;
            loginBtn.textContent = '⏳ Verificando...';
            alertBox.style.display = 'none';

            try {
                // Fazer login
                const response = await fetch(`${API_BASE}/auth/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.message || 'Erro ao fazer login');
                }

                // Salvar token
                localStorage.setItem('authToken', data.token);

                // Verificar se é admin
                const userResponse = await fetch(`${API_BASE}/users/me`, {
                    headers: {
                        'Authorization': `Bearer ${data.token}`
                    }
                });

                const user = await userResponse.json();

                if (!user.is_admin) {
                    // Não é admin - limpar token e mostrar erro
                    localStorage.removeItem('authToken');
                    throw new Error('Acesso negado! Apenas administradores podem acessar esta área.');
                }

                // É admin - redirecionar
                showAlert('✅ Login realizado! Redirecionando...', 'success');
                
                setTimeout(() => {
                    window.location.href = '/admin';
                }, 1000);

            } catch (error) {
                console.error('Erro no login:', error);
                showAlert(`❌ ${error.message}`, 'error');
                loginBtn.disabled = false;
                loginBtn.textContent = '🔓 Entrar como Admin';
            }
        });

        function showAlert(message, type) {
            const alertBox = document.getElementById('alertBox');
            alertBox.textContent = message;
            alertBox.className = `alert alert-${type}`;
            alertBox.style.display = 'block';
        }

        // Verificar se já está logado
        window.addEventListener('DOMContentLoaded', async () => {
            const token = localStorage.getItem('authToken');
            
            if (token) {
                try {
                    const response = await fetch(`${API_BASE}/users/me`, {
                        headers: {
                            'Authorization': `Bearer ${token}`
                        }
                    });

                    const user = await response.json();

                    if (user.is_admin) {
                        // Já está logado como admin
                        window.location.href = '/admin';
                    }
                } catch (error) {
                    // Token inválido ou erro - continuar no login
                    localStorage.removeItem('authToken');
                }
            }
        });
    </script>
</body>
</html>
