<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cursos Linux - Red Innovations</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Fira Code', 'JetBrains Mono', 'Ubuntu Mono', 'DejaVu Sans Mono', monospace;
        }
        
        body {
            background-color: #0b0f14;
            color: #e5e7eb;
            line-height: 1.6;
            padding: 20px;
            background-image: 
                linear-gradient(rgba(0, 255, 136, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 136, 0.03) 1px, transparent 1px);
            background-size: 20px 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
            border-bottom: 1px solid #1f2937;
            margin-bottom: 30px;
        }
        
        .logo, .logo:link, .logo:visited, .logo:hover, .logo:active {
            font-size: 24px;
            font-weight: bold;
            color: #00ff88 !important;
            display: flex;
            align-items: center;
            cursor: pointer;
            text-decoration: none;
        }

        .logo:hover {
            opacity: 0.8;
        }

        .logo svg {
            margin-right: 10px;
        }

        nav {
            display: flex;
            align-items: center;
            gap: 40px;
        }
        
        nav ul {
            display: flex;
            list-style: none;
            align-items: center;
            gap: 25px;
        }
        
        nav a {
            color: #94a3b8;
            text-decoration: none;
            transition: color 0.3s;
        }
        
        nav a:hover, nav a.active {
            color: #00ff88;
        }

        .user-menu-container {
            position: relative;
        }

        .user-menu-button {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            color: #94a3b8;
        }
        
        .avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 2px solid #334155;
        }

        .user-dropdown {
            display: none;
            position: absolute;
            right: 0;
            top: 120%;
            background-color: #111827;
            border: 1px solid #1f2937;
            border-radius: 8px;
            min-width: 180px;
            z-index: 10;
        }

        .user-dropdown a {
            color: #94a3b8;
            padding: 10px 15px;
            text-decoration: none;
            display: block;
        }
        
        .hero {
            text-align: center;
            margin-bottom: 40px;
        }
        
        .hero h1 {
            font-size: 2.5rem;
            color: #00ff88;
            margin-bottom: 15px;
        }
        
        .hero p {
            color: #94a3b8;
            font-size: 1.1rem;
        }
        
        .courses-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 25px;
            margin-bottom: 50px;
        }
        
        .course-card {
            background: #0e141a;
            border: 1px solid #1f2937;
            border-radius: 12px;
            padding: 25px;
            transition: transform 0.3s, border-color 0.3s;
        }
        
        .course-card:hover {
            transform: translateY(-5px);
            border-color: #00ff88;
        }
        
        .course-card h3 {
            color: #00ff88;
            margin-bottom: 15px;
            font-size: 1.3rem;
        }
        
        .course-info {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            color: #94a3b8;
            font-size: 0.9rem;
        }
        
        .progress-container {
            background: #1f2937;
            border-radius: 10px;
            height: 8px;
            margin-bottom: 15px;
            overflow: hidden;
        }
        
        .progress-bar {
            background: #00ff88;
            height: 100%;
            border-radius: 10px;
            transition: width 0.3s;
        }
        
        .course-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: background-color 0.3s;
        }
        
        .btn-primary {
            background: #00ff88;
            color: #0b0f14;
        }
        
        .btn-primary:hover {
            background: #00cc6a;
        }
        
        .btn-secondary {
            background: #334155;
            color: #e5e7eb;
        }
        .btn-secondary:hover {
            background: #4b5563;
        }
        
        .btn-certificate {
            background: #fbbf24;
            color: #0b0f14;
        }
        
        .btn-certificate:hover {
            background: #f59e0b;
        }

        .btn-linkedin {
            background-color: #0A66C2;
            color: white;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-linkedin:hover {
            background-color: #004182;
        }

        .btn-linkedin svg {
            width: 18px;
            height: 18px;
            fill: currentColor;
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(11, 15, 20, 0.95);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            -webkit-backdrop-filter: blur(5px);
            backdrop-filter: blur(5px);
        }
        
        .modal-content {
            background: #0e141a;
            border: 2px solid #00ff88;
            border-radius: 12px;
            padding: 25px;
            max-width: 90vw;
            width: 800px;
            max-height: 85vh;
            overflow-y: auto;
            position: relative;
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid #1f2937;
        }
        
        .modal-header h2 {
            color: #00ff88;
        }
        
        .close-modal {
            background: none;
            border: none;
            color: #94a3b8;
            font-size: 28px;
            cursor: pointer;
        }

        .lesson-list {
            list-style: none;
        }
        
        .lesson-item {
            padding: 15px;
            border: 1px solid #1f2937;
            border-radius: 8px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #0b0f14;
        }
        
        .lesson-item.completed {
            border-color: #00ff88;
            background: rgba(0, 255, 136, 0.05);
        }
        
        .lesson-info {
            flex: 1;
        }
        
        .lesson-title {
            color: #e5e7eb;
            margin-bottom: 5px;
            font-weight: bold;
        }
        
        .lesson-duration {
            color: #94a3b8;
            font-size: 0.9rem;
        }
        
        .lesson-actions {
            display: flex;
            gap: 10px;
        }
        
        footer {
            text-align: center;
            margin-top: 50px;
            padding-top: 30px;
            border-top: 1px solid #1f2937;
            color: #94a3b8;
        }
        
    </style>
</head>
<body>
    <div class="container">
        <header>
            <a href="/" id="logo-link" class="logo" style="text-decoration: none;">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 2L2 7L12 12L22 7L12 2Z" stroke="#00ff88" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M2 17L12 22L22 17" stroke="#00ff88" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M2 12L12 17L22 12" stroke="#00ff88" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                <span>Academy Z</span>
            </a>
            <nav>
                <ul>
                    <li><a href="/home">Home</a></li>
                    <li><a href="/cursos" class="active">Cursos</a></li>
                    <li><a href="/verificar">Verificação</a></li>
                    <li><a href="#">Contato</a></li>
                </ul>
                <ul id="nav-auth-links">
                    <li><a href="/">Login</a></li>
                </ul>
            </nav>
        </header>

        <div class="hero">
            <h1>Curso de Linux</h1>
            <p>Aprenda Linux do básico ao avançado e receba seu certificado</p>
        </div>

        <div class="courses-grid" id="coursesContainer"></div>

        <div class="modal" id="courseModal">
            <div class="modal-content">
                <div class="modal-header">
                    <h2 id="modalTitle">Detalhes do Curso</h2>
                    <button class="close-modal" onclick="closeModal()">×</button>
                </div>
                <div id="modalContent"></div>
            </div>
        </div>

        <footer>
            <p>Red Innovations &copy; 2025 - Curso de Linux</p>
            <p>Instrutor: José Moraes - Diretor: Danilo Germano</p>
        </footer>
    </div>

    <script src="/js/main.js"></script>
    <script>
        const API_BASE = '/api';
        let currentUser = null;
        let lastGeneratedCert = null;
        
        let courses = [
            {
                id: 1,
                title: "Introdução ao Linux",
                description: "Aprenda os conceitos fundamentais do sistema operacional Linux, sua história e distribuições.",
                duration: "2 horas",
                lessons: [
                    { id: 1, title: "O que é Linux?", duration: "15 min", completed: false, videoUrl: "/videos/video1.mp4" },
                    { id: 2, title: "História do Linux", duration: "20 min", completed: false, videoUrl: "/videos/video2.mp4" },
                    { id: 3, title: "Distribuições Linux", duration: "25 min", completed: false, videoUrl: "/videos/video3.mp4" },
                    { id: 4, title: "Instalação do Linux", duration: "30 min", completed: false, videoUrl: "/videos/video4.mp4" },
                    { id: 5, title: "Primeiros Passos", duration: "30 min", completed: false, videoUrl: "/videos/video5.mp4" }
                ],
                completed: false,
                progress: 0
            },
            {
                id: 2,
                title: "Comandos Terminal",
                description: "Domine o terminal Linux e aprenda comandos essenciais para produtividade.",
                duration: "3 horas",
                lessons: [
                    { id: 1, title: "Navegação Básica", duration: "20 min", completed: false, videoUrl: "/videos/video6.mp4" },
                    { id: 2, title: "Manipulação de Arquivos", duration: "25 min", completed: false, videoUrl: "/videos/video7.mp4" },
                    { id: 3, title: "Permissões e Donos", duration: "30 min", completed: false, videoUrl: "/videos/video8.mp4" },
                    { id: 4, title: "Processos e Serviços", duration: "25 min", completed: false, videoUrl: "/videos/video9.mp4" },
                    { id: 5, title: "Redirecionamentos", duration: "30 min", completed: false, videoUrl: "/videos/video10.mp4" },
                    { id: 6, title: "Scripts Básicos", duration: "30 min", completed: false, videoUrl: "/videos/video11.mp4" },
                    { id: 7, title: "Ferramentas Úteis", duration: "20 min", completed: false, videoUrl: "/videos/video12.mp4" }
                ],
                completed: false,
                progress: 0
            },
            {
                id: 3,
                title: "Administração Linux",
                description: "Aprenda a gerenciar sistemas Linux como um administrador profissional.",
                duration: "4 horas",
                lessons: [
                    { id: 1, title: "Gerenciamento de Usuários", duration: "25 min", completed: false, videoUrl: "/videos/video13.mp4" },
                    { id: 2, title: "Gerenciamento de Pacotes", duration: "30 min", completed: false, videoUrl: "/videos/video14.mp4" },
                    { id: 3, title: "Configuração de Rede", duration: "35 min", completed: false, videoUrl: "/videos/video15.mp4" },
                    { id: 4, title: "Serviços e Daemons", duration: "30 min", completed: false, videoUrl: "/videos/video16.mp4" },
                    { id: 5, title: "Backup e Restauração", duration: "25 min", completed: false, videoUrl: "/videos/video17.mp4" },
                    { id: 6, title: "Monitoramento", duration: "30 min", completed: false, videoUrl: "/videos/video18.mp4" },
                    { id: 7, title: "Segurança Básica", duration: "25 min", completed: false, videoUrl: "/videos/video19.mp4" },
                    { id: 8, title: "Troubleshooting", duration: "30 min", completed: false, videoUrl: "/videos/video20.mp4" }
                ],
                completed: false,
                progress: 0
            }
        ];

        document.addEventListener('DOMContentLoaded', () => {
            const token = localStorage.getItem('authToken');
            if (!token) {
                window.location.href = '/';
                return;
            }
            initializeApp(token);
        });

        async function initializeApp(token) {
            try {
                const userRes = await fetch('/api/users/me', { headers: { 'Authorization': `Bearer ${token}` } });
                currentUser = await userRes.json();
                await loadProgress(token);
            } catch (error) {
                console.error("Erro na inicialização:", error);
                localStorage.removeItem('authToken');
                window.location.href = '/';
            }
        }

        async function loadProgress(token) {
            try {
                const response = await fetch(`${API_BASE}/progress`, { headers: { 'Authorization': `Bearer ${token}` } });
                const progress = await response.json();
                
                courses.forEach(course => {
                    course.lessons.forEach(lesson => {
                        lesson.completed = progress.some(p => p.course_id === course.id && p.lesson_id === lesson.id);
                    });
                    calculateProgress(course);
                });
                renderCourses();
            } catch (error) {
                console.error("Erro ao carregar progresso:", error);
            }
        }

        function calculateProgress(course) {
            const completedLessons = course.lessons.filter(l => l.completed).length;
            course.progress = Math.round((completedLessons / course.lessons.length) * 100);
            course.completed = course.progress === 100;
        }

        function renderCourses() {
            const container = document.getElementById('coursesContainer');
            container.innerHTML = '';
            courses.forEach(course => {
                const card = document.createElement('div');
                card.className = 'course-card';
                let actionButtons = `<button class="btn btn-primary" onclick="viewCourse(${course.id})">${course.progress > 0 ? 'Continuar' : 'Começar'}</button>`;
                
                if (course.completed) {
                     actionButtons += `<button class="btn btn-secondary" onclick="generateCertificate(${course.id}, event)">Emitir Certificado</button>`;
                }
                
                card.innerHTML = `
                    <h3>${course.title}</h3>
                    <p>${course.description}</p>
                    <div class="course-info"><span>${course.duration}</span><span>${course.lessons.length} aulas</span></div>
                    <div class="progress-container"><div class="progress-bar" style="width: ${course.progress}%"></div></div>
                    <div class="course-actions" id="actions-${course.id}">${actionButtons}</div>
                `;
                container.appendChild(card);
            });
        }

         async function downloadCertificate(certId, button) {
        try {
            button.innerHTML = 'Baixando...';
            const response = await fetch(`${API_BASE}/certificates/generate/${certId}`);
            if (!response.ok) {
                throw new Error('Falha ao baixar a imagem.');
            }
            const blob = await response.blob();
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.style.display = 'none';
            a.href = url;
            a.download = `certificado-${certId}.png`;
            document.body.appendChild(a);
            a.click();
            window.URL.revokeObjectURL(url);
            a.remove();
        } catch (error) {
            alert(error.message);
        } finally {
             // Atualiza a UI para mostrar que o certificado foi emitido
            button.textContent = 'Certificado Emitido';
            button.disabled = true;

            const courseId = parseInt(button.id.split('-')[2]);
            const course = courses.find(c => c.id === courseId);
            const cert = { course_name: course.title, certificate_id: certId };

            const actionsContainer = document.getElementById(`actions-${course.id}`);
            const linkedinButton = document.createElement('a');
            linkedinButton.href = getLinkedInShareUrl(cert);
            linkedinButton.target = '_blank';
            linkedinButton.className = 'btn btn-linkedin';
            linkedinButton.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M20.5 2h-17A1.5 1.5 0 0 0 2 3.5v17A1.5 1.5 0 0 0 3.5 22h17a1.5 1.5 0 0 0 1.5-1.5v-17A1.5 1.5 0 0 0 20.5 2ZM8 19H5v-9h3zM6.5 8.25A1.75 1.75 0 1 1 8.25 6.5 1.75 1.75 0 0 1 6.5 8.25ZM19 19h-3v-4.75c0-1.4-1.2-2.5-2.5-2.5S11 12.85 11 14.25V19h-3v-9h2.9v1.3a3.11 3.11 0 0 1 2.6-1.4c2.5 0 4.5 2.2 4.5 5.1V19z"></path></svg> Compartilhar`;
            actionsContainer.appendChild(linkedinButton);
        }
    }
        
        async function completeLesson(courseId, lessonId) {
            const token = localStorage.getItem('authToken');
            const course = courses.find(c => c.id === courseId);
            const lesson = course.lessons.find(l => l.id === lessonId);
            if (lesson.completed) return;

            try {
                const response = await fetch(`${API_BASE}/progress/complete-lesson`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify({ courseId, lessonId, totalLessonsInCourse: course.lessons.length })
                });
                if (!response.ok) throw new Error('Falha ao salvar progresso.');
                
                lesson.completed = true;
                calculateProgress(course);
                renderCourses(); 
                if (course.completed) {
                    setTimeout(() => alert(`🎉 Parabéns! Você concluiu o curso "${course.title}"!`), 500);
                }
            } catch (error) {
                alert(error.message);
            }
        }

        async function generateCertificate(courseId, event) {
            const course = courses.find(c => c.id === courseId);
            if (!course || !course.completed || !currentUser) return alert('Você precisa concluir o curso primeiro!');
            
            const token = localStorage.getItem('authToken');
            const button = event.target;
            button.disabled = true;
            button.innerHTML = 'Processando...';
            button.id = `btn-emitir-${course.id}`;

            try {
                const certId = `LINUX${new Date().getFullYear()}-${Math.random().toString(36).substring(2, 11).toUpperCase()}`;

                const createResponse = await fetch(`${API_BASE}/certificates`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify({
                        participant_name: currentUser.name,
                        course_name: course.title,
                        hours: parseInt(course.duration, 10),
                        issue_date: new Date().toISOString().split('T')[0],
                        completion_date: new Date().toISOString().split('T')[0],
                        certificate_id: certId,
                        modalidade: 'Online'
                    })
                });

                if (!createResponse.ok) throw new Error((await createResponse.json()).message || 'Falha ao registrar o certificado.');
                
                const generatedCert = await createResponse.json();
                alert(`✅ Certificado "${generatedCert.certificate_id}" registrado! O download começará em seguida.`);

                // Chama a função de download
                await downloadCertificate(generatedCert.certificate_id, button);

            } catch (error) {
                console.error('Erro ao gerar certificado:', error);
                alert(`❌ Erro: ${error.message}`);
                button.disabled = false;
                button.innerHTML = 'Emitir Certificado';
            }
        }

        function getLinkedInShareUrl(cert) {
            const name = encodeURIComponent(cert.course_name);
            const organizationName = encodeURIComponent("Red Innovations");
            const issueDate = new Date(cert.completion_date);
            const issueYear = issueDate.getFullYear();
            const issueMonth = issueDate.getMonth() + 1;
            const certUrl = encodeURIComponent(`http://academyz.com.br/verify?id=${cert.certificate_id}`);
            const certId = encodeURIComponent(cert.certificate_id);
            return `https://www.linkedin.com/profile/add?startTask=CERTIFICATION_NAME&name=${name}&organizationName=${organizationName}&issueYear=${issueYear}&issueMonth=${issueMonth}&certUrl=${certUrl}&certId=${certId}`;
        }

        function closeModal() {
            document.getElementById('courseModal').style.display = 'none';
        }

        function viewCourse(courseId) {
            const course = courses.find(c => c.id === courseId);
            if (!course) return;

            document.getElementById('modalTitle').textContent = course.title;
            let lessonsHtml = `<ul class="lesson-list">`;
                
            course.lessons.forEach(lesson => {
                lessonsHtml += `
                    <li class="lesson-item ${lesson.completed ? 'completed' : ''}">
                        <span>${lesson.title} (${lesson.duration})</span>
                        <div class="lesson-actions">
                            <button class="btn btn-primary" onclick="playVideo(${course.id}, ${lesson.id})">${lesson.completed ? 'Rever' : 'Assistir'}</button>
                        </div>
                    </li>
                `;
            });
            
            lessonsHtml += '</ul>';
            document.getElementById('modalContent').innerHTML = lessonsHtml;
            document.getElementById('courseModal').style.display = 'flex';
        }

        function playVideo(courseId, lessonId) {
            const course = courses.find(c => c.id === courseId);
            const lesson = course.lessons.find(l => l.id === lessonId);
            document.getElementById('modalTitle').textContent = `Aula: ${lesson.title}`;
            document.getElementById('modalContent').innerHTML = `
                <div style="background: #000; padding: 10px;">
                    <video controls autoplay style="width: 100%;">
                        <source src="${lesson.videoUrl}" type="video/mp4">
                        Seu navegador não suporta vídeos.
                    </video>
                </div>
                <div style="margin-top: 20px; display: flex; gap: 15px;">
                    ${!lesson.completed ? `<button class="btn btn-primary" onclick="completeLesson(${course.id}, ${lesson.id}); viewCourse(${course.id});">Marcar como Concluída</button>` : ''}
                    <button class="btn btn-secondary" onclick="viewCourse(${course.id})">Voltar para Aulas</button>
                </div>
            `;
        }

    </script>
</body>
</html>
