<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="1000" viewBox="0 0 1400 1000">
  <defs>
    <linearGradient id="scanGeral" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" style="stop-color:#00b4d8;stop-opacity:0.12" />
      <stop offset="100%" style="stop-color:#0077b6;stop-opacity:0.12" />
    </linearGradient>
    <linearGradient id="borderGeral" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00b4d8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0077b6;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1400" height="1000" fill="#ffffff"/>
  <rect width="1400" height="1000" fill="url(#scanGeral)"/>

  <!-- Border simples e elegante -->
  <rect x="40" y="40" width="1320" height="920" fill="none" stroke="url(#borderGeral)" stroke-width="3" rx="10"/>
  <rect x="50" y="50" width="1300" height="900" fill="none" stroke="url(#borderGeral)" stroke-width="1" rx="8"/>

  <!-- Elementos decorativos -->
  <g opacity="0.1">
    <circle cx="180" cy="140" r="40" fill="#00b4d8"/>
    <circle cx="1220" cy="140" r="40" fill="#0077b6"/>
    <circle cx="180" cy="860" r="40" fill="#0077b6"/>
    <circle cx="1220" cy="860" r="40" fill="#00b4d8"/>
  </g>

  <!-- Header -->
  <text x="700" y="120" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#00b4d8" text-anchor="middle">ACADEMY Z</text>
  <text x="700" y="155" font-family="Arial, sans-serif" font-size="18" fill="#0077b6" text-anchor="middle">Educação Profissional</text>

  <!-- Title -->
  <text x="700" y="240" font-family="Georgia, serif" font-size="56" font-weight="bold" fill="#2d3748" text-anchor="middle">CERTIFICADO</text>
  <line x1="480" y1="260" x2="920" y2="260" stroke="url(#borderGeral)" stroke-width="2"/>

  <!-- Corpo do texto -->
  <text x="700" y="325" font-family="Arial, sans-serif" font-size="20" fill="#4a5568" text-anchor="middle">Certificamos que</text>

  <!-- Nome do participante -->
  <text x="700" y="390" font-family="Georgia, serif" font-size="42" font-weight="bold" fill="#2d3748" text-anchor="middle" id="participantName">{{PARTICIPANT_NAME}}</text>
  <line x1="290" y1="405" x2="1110" y2="405" stroke="#00b4d8" stroke-width="2"/>

  <!-- Texto do curso -->
  <text x="700" y="468" font-family="Arial, sans-serif" font-size="20" fill="#4a5568" text-anchor="middle">concluiu com êxito o curso de</text>

  <!-- Nome do curso -->
  <text x="700" y="530" font-family="Georgia, serif" font-size="36" font-weight="bold" fill="#00b4d8" text-anchor="middle" id="courseName">{{COURSE_NAME}}</text>

  <!-- Informações do curso -->
  <text x="700" y="592" font-family="Arial, sans-serif" font-size="18" fill="#4a5568" text-anchor="middle">
    com carga horária de <tspan font-weight="bold" fill="#0077b6">{{HOURS}}</tspan>
  </text>
  <text x="700" y="622" font-family="Arial, sans-serif" font-size="18" fill="#4a5568" text-anchor="middle">
    realizado na modalidade <tspan font-weight="bold" fill="#0077b6">{{MODALIDADE}}</tspan>
  </text>

  <!-- Data -->
  <text x="700" y="675" font-family="Arial, sans-serif" font-size="18" fill="#4a5568" text-anchor="middle">
    Emitido em <tspan font-weight="bold">{{COMPLETION_DATE}}</tspan>
  </text>

  <!-- Assinatura -->
  <g transform="translate(700, 760)">
    <line x1="-150" y1="0" x2="150" y2="0" stroke="#2d3748" stroke-width="1"/>
    <text x="0" y="25" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#2d3748" text-anchor="middle">José Moraes</text>
    <text x="0" y="45" font-family="Arial, sans-serif" font-size="14" fill="#718096" text-anchor="middle">Coordenador Geral</text>
  </g>

  <!-- QR Code -->
  <g id="qrcode" transform="translate(1150, 740)">
    {{QR_CODE}}
  </g>

  <!-- Footer -->
  <text x="700" y="930" font-family="Arial, sans-serif" font-size="12" fill="#718096" text-anchor="middle">
    Certificado ID: <tspan font-weight="bold" fill="#00b4d8">{{CERTIFICATE_ID}}</tspan>
  </text>
  <text x="700" y="950" font-family="Arial, sans-serif" font-size="12" fill="#718096" text-anchor="middle">
    Verificação: <tspan fill="#0077b6">academyz.com.br/verificar/{{HASH}}</tspan>
  </text>
</svg>
