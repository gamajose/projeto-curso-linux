<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="1000" viewBox="0 0 1400 1000">
  <defs>
    <linearGradient id="scanLaw" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#8b5a3c" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#8b5a3c" stop-opacity="0.06"/>
      <stop offset="1" stop-color="#d4a574" stop-opacity="0"/>
    </linearGradient>
    <pattern id="gridLaw" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M20 0 H0 V20" fill="none" stroke="#2d1a10" stroke-opacity="0.25" stroke-width="1"/>
    </pattern>
    <style>
      .mono { font-family: "Courier New",monospace; }
      .serif { font-family: "Georgia","Times New Roman",serif; }
      .soft { fill: #94a3b8; }
      .brown { fill: #8b5a3c; }
      .gold { fill: #d4a574; }
      .bronze { fill: #b8860b; }
      .muted { fill: #9ca3af; }
      .white { fill: #e5e7eb; }
      .dark { fill: #2d3748; }
    </style>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="1400" height="1000" fill="#f5f1ed"/>
  <rect x="0" y="0" width="1400" height="1000" fill="url(#gridLaw)" opacity="0.15"/>
  <rect x="0" y="0" width="1400" height="1000" fill="url(#scanLaw)"/>

  <!-- Símbolos jurídicos decorativos -->
  <g opacity="0.04" class="brown">
    <text x="80" y="120" font-size="80" font-family="serif">§</text>
    <text x="1280" y="120" font-size="80" font-family="serif">⚖</text>
    <text x="80" y="920" font-size="80" font-family="serif">⚖</text>
    <text x="1280" y="920" font-size="80" font-family="serif">§</text>
  </g>

  <!-- Container principal -->
  <g transform="translate(80,90)">
    <!-- Bordas ornamentadas -->
    <rect x="0" y="0" rx="5" ry="5" width="1240" height="820" fill="#faf8f5" stroke="#8b5a3c" stroke-width="4"/>
    <rect x="8" y="8" rx="4" ry="4" width="1224" height="804" fill="none" stroke="#d4a574" stroke-width="2"/>
    <rect x="15" y="15" rx="3" ry="3" width="1210" height="790" fill="none" stroke="#8b5a3c" stroke-width="1"/>

    <!-- Conteúdo -->
    <g transform="translate(60,80)">
      <!-- Cabeçalho formal -->
      <text x="560" y="0" class="serif brown" font-size="28" font-weight="bold" text-anchor="middle">ACADEMY Z</text>
      <text x="560" y="28" class="serif gold" font-size="16" font-style="italic" text-anchor="middle">Instituição de Ensino Profissionalizante</text>
      
      <rect x="400" y="40" width="320" height="2" fill="#8b5a3c"/>

      <!-- Artigos e parágrafos (estilo lei) -->
      <g transform="translate(0,80)">
        <text x="0" y="0" class="serif dark" font-size="18" font-weight="600">
          CERTIFICADO N.º {{CERTIFICATE_ID}}
        </text>
        
        <text x="0" y="40" class="serif dark" font-size="16" text-anchor="start">
          <tspan x="0" dy="0">Art. 1º - Certificamos, para os devidos fins de direito, que:</tspan>
        </text>
      </g>

      <!-- Nome do participante (destaque) -->
      <g transform="translate(0,170)">
        <text x="0" y="0" class="serif brown" font-size="20" font-weight="600">
          § 1º PARTICIPANTE QUALIFICADO:
        </text>
        <text x="0" y="45" class="serif dark" font-size="40" font-weight="700">
          {{PARTICIPANT_NAME}}
        </text>
        <rect x="0" y="55" width="1000" height="2" fill="#8b5a3c"/>
      </g>

      <!-- Curso -->
      <g transform="translate(0,280)">
        <text x="0" y="0" class="serif dark" font-size="16">
          <tspan x="0" dy="0">Art. 2º - Concluiu com êxito e aproveitamento satisfatório o curso de:</tspan>
        </text>
        
        <text x="0" y="45" class="serif brown" font-size="34" font-weight="700">
          {{COURSE_NAME}}
        </text>
      </g>

      <!-- Disposições gerais -->
      <g transform="translate(0,380)">
        <rect x="0" y="0" width="1000" height="1" fill="#8b5a3c"/>
        
        <text x="0" y="35" class="serif dark" font-size="16">
          <tspan x="0" dy="0">Art. 3º - O presente curso possui as seguintes características:</tspan>
        </text>
        
        <text x="0" y="70" class="serif dark" font-size="16">
          <tspan x="0" dy="0">§ 1º Carga horária total de </tspan>
          <tspan class="brown" font-weight="700">{{HOURS}}</tspan>
          <tspan> (horas);</tspan>
        </text>
        
        <text x="0" y="95" class="serif dark" font-size="16">
          <tspan x="0" dy="0">§ 2º Realizado na modalidade </tspan>
          <tspan class="brown" font-weight="700">{{MODALIDADE}}</tspan>
          <tspan>;</tspan>
        </text>
        
        <text x="0" y="120" class="serif dark" font-size="16">
          <tspan x="0" dy="0">§ 3º Emitido em </tspan>
          <tspan class="brown" font-weight="700">{{COMPLETION_DATE}}</tspan>
          <tspan>.</tspan>
        </text>

        <rect x="0" y="140" width="1000" height="1" fill="#8b5a3c"/>
      </g>

      <!-- Validação jurídica -->
      <g transform="translate(0,545)">
        <text x="0" y="0" class="mono muted" font-size="13">
          <tspan>Protocolo de Verificação:</tspan>
        </text>
        <text x="0" y="20" class="mono brown" font-size="13" font-weight="600">
          Hash: {{HASH}}
        </text>
        <text x="0" y="40" class="mono muted" font-size="12">
          URL: academyz.com.br/verificar/{{HASH}}
        </text>
      </g>

      <!-- Assinatura -->
      <g transform="translate(300,600)">
        <rect x="0" y="0" width="1000" height="1" fill="#8b5a3c"/>
        
        <g transform="translate(100,30)">
          <image href="{{IMAGEM_ASSINATURA_JOSE}}" x="25" y="-5" width="250" height="100" />
          <rect x="0" y="55" width="300" height="2" fill="#8b5a3c"/>
          <text x="150" y="80" class="serif dark" font-size="20" font-weight="700" text-anchor="middle">José Moraes</text>
          <text x="150" y="100" class="serif muted" font-size="14" font-style="italic" text-anchor="middle">Coordenador Jurídico</text>
          <text x="150" y="115" class="serif muted" font-size="12" text-anchor="middle">OAB/BR Nº XXXXX</text>
        </g>
      </g>

      <!-- QR Code -->
      <g transform="translate(830,120)">
        <rect x="0" y="0" width="280" height="280" rx="8" ry="8" fill="#faf8f5" stroke="#8b5a3c" stroke-width="2"/>
        <rect x="24" y="24" width="232" height="232" fill="#ffffff" stroke="#d4a574"/>
        {{QR_CODE}}
        <text x="140" y="310" class="serif brown" font-size="14" text-anchor="middle" font-weight="600">Verificação Digital</text>
        <text x="140" y="330" class="serif muted" font-size="12" text-anchor="middle">Academy Z</text>
      </g>

      <!-- Rodapé formal -->
      <text x="0" y="775" class="serif muted" font-size="11" font-style="italic">
        Este certificado possui validade nacional e internacional, conforme legislação vigente.
      </text>
    </g>
  </g>
</svg>
