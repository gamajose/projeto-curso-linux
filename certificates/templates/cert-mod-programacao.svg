<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="1000" viewBox="0 0 1400 1000">
  <defs>
    <linearGradient id="scanProgramacao" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:0.15" />
    </linearGradient>
    <linearGradient id="borderProgramacao" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1400" height="1000" fill="#ffffff"/>
  <rect width="1400" height="1000" fill="url(#scanProgramacao)"/>

  <!-- Código binário decorativo -->
  <g opacity="0.05" font-family="Courier New, monospace" font-size="12" fill="#667eea">
    <text x="100" y="100">01001000 01100101 01101100 01101100 01101111</text>
    <text x="1000" y="100">01010111 01101111 01110010 01101100 01100100</text>
    <text x="100" y="900">01000011 01101111 01100100 01100101</text>
    <text x="1000" y="900">01010000 01111001 01110100 01101000 01101111 01101110</text>
  </g>

  <!-- Border -->
  <rect x="40" y="40" width="1320" height="920" fill="none" stroke="url(#borderProgramacao)" stroke-width="3" rx="10"/>
  <rect x="50" y="50" width="1300" height="900" fill="none" stroke="url(#borderProgramacao)" stroke-width="1" rx="8"/>

  <!-- Símbolos de programação -->
  <g opacity="0.1" font-family="Courier New, monospace" font-size="48" fill="#764ba2" font-weight="bold">
    <text x="150" y="150">{ }</text>
    <text x="1200" y="150">&lt; /&gt;</text>
    <text x="150" y="870">[ ]</text>
    <text x="1200" y="870">( )</text>
  </g>

  <!-- Header -->
  <text x="700" y="115" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#667eea" text-anchor="middle">ACADEMY Z</text>
  <text x="700" y="150" font-family="Courier New, monospace" font-size="18" fill="#764ba2" text-anchor="middle">Área: Programação & Desenvolvimento</text>

  <!-- Title -->
  <text x="700" y="238" font-family="Georgia, serif" font-size="56" font-weight="bold" fill="#2d3748" text-anchor="middle">CERTIFICADO</text>
  <line x1="480" y1="258" x2="920" y2="258" stroke="url(#borderProgramacao)" stroke-width="2"/>

  <!-- Corpo do texto -->
  <text x="700" y="320" font-family="Arial, sans-serif" font-size="20" fill="#4a5568" text-anchor="middle">Certificamos que</text>

  <!-- Nome do participante -->
  <text x="700" y="385" font-family="Georgia, serif" font-size="42" font-weight="bold" fill="#2d3748" text-anchor="middle" id="participantName">{{PARTICIPANT_NAME}}</text>
  <line x1="290" y1="400" x2="1110" y2="400" stroke="#667eea" stroke-width="2"/>

  <!-- Texto do curso -->
  <text x="700" y="462" font-family="Arial, sans-serif" font-size="20" fill="#4a5568" text-anchor="middle">concluiu com êxito o curso de</text>

  <!-- Nome do curso -->
  <text x="700" y="525" font-family="Courier New, monospace" font-size="36" font-weight="bold" fill="#667eea" text-anchor="middle" id="courseName">{{COURSE_NAME}}</text>

  <!-- Informações do curso -->
  <text x="700" y="588" font-family="Arial, sans-serif" font-size="18" fill="#4a5568" text-anchor="middle">
    com carga horária de <tspan font-weight="bold" fill="#764ba2">{{HOURS}}</tspan>
  </text>
  <text x="700" y="618" font-family="Arial, sans-serif" font-size="18" fill="#4a5568" text-anchor="middle">
    realizado na modalidade <tspan font-weight="bold" fill="#764ba2">{{MODALIDADE}}</tspan>
  </text>

  <!-- Data -->
  <text x="700" y="670" font-family="Arial, sans-serif" font-size="18" fill="#4a5568" text-anchor="middle">
    Emitido em <tspan font-weight="bold">{{COMPLETION_DATE}}</tspan>
  </text>

  <!-- Assinatura -->
  <g transform="translate(700, 755)">
    <line x1="-150" y1="0" x2="150" y2="0" stroke="#2d3748" stroke-width="1"/>
    <text x="0" y="25" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#2d3748" text-anchor="middle">José Moraes</text>
    <text x="0" y="45" font-family="Arial, sans-serif" font-size="14" fill="#718096" text-anchor="middle">Coordenador de Tecnologia</text>
  </g>

  <!-- QR Code -->
  <g id="qrcode" transform="translate(1150, 735)">
    {{QR_CODE}}
  </g>

  <!-- Footer -->
  <text x="700" y="930" font-family="Courier New, monospace" font-size="12" fill="#718096" text-anchor="middle">
    Certificado ID: <tspan font-weight="bold" fill="#667eea">{{CERTIFICATE_ID}}</tspan>
  </text>
  <text x="700" y="950" font-family="Courier New, monospace" font-size="12" fill="#718096" text-anchor="middle">
    Verificação: <tspan fill="#764ba2">academyz.com.br/verificar/{{HASH}}</tspan>
  </text>
</svg>
