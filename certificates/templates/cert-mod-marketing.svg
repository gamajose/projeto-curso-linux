<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="1000" viewBox="0 0 1400 1000">
  <defs>
    <linearGradient id="scanMkt" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ff6b9d" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#ff6b9d" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#c471ed" stop-opacity="0"/>
    </linearGradient>
    <pattern id="gridMkt" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M20 0 H0 V20" fill="none" stroke="#3d1a33" stroke-opacity="0.35" stroke-width="1"/>
    </pattern>
    <style>
      .mono { font-family: "Fira Code","JetBrains Mono","Courier New",monospace; }
      .sans { font-family: "Inter","Arial",sans-serif; }
      .soft { fill: #94a3b8; }
      .pink { fill: #ff6b9d; }
      .purple { fill: #c471ed; }
      .orange { fill: #fb923c; }
      .muted { fill: #9ca3af; }
      .white { fill: #e5e7eb; }
    </style>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="1400" height="1000" fill="#1a0a1a"/>
  <rect x="0" y="0" width="1400" height="1000" fill="url(#gridMkt)" opacity="0.3"/>
  <rect x="0" y="0" width="1400" height="1000" fill="url(#scanMkt)"/>

  <!-- Ícones de marketing decorativos -->
  <g opacity="0.06" fill="#ff6b9d">
    <circle cx="100" cy="100" r="30"/>
    <rect x="1250" y="80" width="60" height="60" rx="10"/>
    <polygon points="100,900 130,950 70,950" />
    <circle cx="1280" cy="920" r="35"/>
  </g>

  <!-- Container principal -->
  <g transform="translate(80,90)">
    <rect x="0" y="0" rx="14" ry="14" width="1240" height="820" fill="#0f0515" stroke="#3d1a33" stroke-width="2"/>
    <rect x="0" y="0" rx="14" ry="14" width="1240" height="44" fill="#1a0a1a"/>
    
    <!-- Botões -->
    <circle cx="26" cy="22" r="7" fill="#ff5f56"/>
    <circle cx="48" cy="22" r="7" fill="#ffbd2e"/>
    <circle cx="70" cy="22" r="7" fill="#27c93f"/>
    <text x="100" y="28" class="mono soft" font-size="18">campaign-certificate.ads - Academy Z Marketing</text>

    <!-- Conteúdo -->
    <g transform="translate(40,80)">
      <!-- Campanha Title -->
      <text x="0" y="0" class="mono pink" font-size="20" font-weight="600">
        📱 CAMPANHA: Certificado de Especialização
      </text>
      <rect x="0" y="10" width="600" height="2" fill="#ff6b9d"/>

      <!-- KPIs / Métricas -->
      <g transform="translate(0,40)">
        <text x="0" y="0" class="mono soft" font-size="16">
          <tspan class="pink">⚡ ROI:</tspan> <tspan class="white">100%</tspan> • 
          <tspan class="pink">👥 Alcance:</tspan> <tspan class="white">Máximo</tspan> • 
          <tspan class="pink">🎯 Conversão:</tspan> <tspan class="white">Aprovado</tspan>
        </text>
      </g>

      <!-- Título CERTIFICADO -->
      <text x="0" y="110" class="sans pink" font-size="56" font-weight="700" letter-spacing="2">CERTIFICADO</text>
      <text x="0" y="145" class="sans purple" font-size="20" font-weight="500">DE ESPECIALIZAÇÃO</text>
      <rect x="0" y="157" width="350" height="4" fill="#ff6b9d"/>

      <!-- Participante -->
      <g transform="translate(0,190)">
        <text x="0" y="0" class="mono soft" font-size="18">
          <tspan class="pink">►</tspan> Target: <tspan class="purple">Profissional Certificado</tspan>
        </text>
        <text x="0" y="35" class="sans white" font-size="40" font-weight="600">{{PARTICIPANT_NAME}}</text>
      </g>

      <!-- Curso -->
      <g transform="translate(0,270)">
        <text x="0" y="0" class="mono soft" font-size="18">
          <tspan class="pink">►</tspan> Curso: <tspan class="purple">Especialização Profissional</tspan>
        </text>
        <text x="0" y="35" class="sans purple" font-size="34" font-weight="600">{{COURSE_NAME}}</text>
      </g>

      <!-- Métricas do curso -->
      <g transform="translate(0,350)">
        <rect x="0" y="0" width="760" height="1" fill="#3d1a33"/>
        
        <text x="0" y="30" class="mono" font-size="18">
          <tspan class="orange">⏱</tspan> <tspan class="soft">Carga Horária:</tspan>
          <tspan class="white" font-weight="600"> {{HOURS}}</tspan>
        </text>
        
        <text x="0" y="60" class="mono" font-size="18">
          <tspan class="orange">📅</tspan> <tspan class="soft">Data de Emissão:</tspan>
          <tspan class="white" font-weight="600"> {{COMPLETION_DATE}}</tspan>
        </text>
        
        <text x="0" y="90" class="mono" font-size="18">
          <tspan class="orange">🌐</tspan> <tspan class="soft">Modalidade:</tspan>
          <tspan class="white" font-weight="600"> {{MODALIDADE}}</tspan>
        </text>

        <rect x="0" y="110" width="760" height="1" fill="#3d1a33"/>
      </g>

      <!-- Validação -->
      <g transform="translate(0,480)">
        <text x="0" y="0" class="mono soft" font-size="16">
          <tspan class="pink">🔐 ID:</tspan> <tspan class="white">{{CERTIFICATE_ID}}</tspan>
        </text>
        
        <text x="0" y="25" class="mono soft" font-size="16">
          <tspan class="pink">🔑 Hash:</tspan> <tspan class="white">{{HASH}}</tspan>
        </text>
        
        <text x="0" y="50" class="mono soft" font-size="14">
          <tspan class="soft">🌐 Verificação:</tspan>
        </text>
        <text x="0" y="70" class="mono purple" font-size="14">
          academyz.com.br/verificar/{{HASH}}
        </text>
      </g>

      <!-- Assinatura -->
      <g transform="translate(180,560)">
        <rect x="0" y="0" width="760" height="1" fill="#3d1a33"/>
        
        <g transform="translate(150,30)">
          <image href="{{IMAGEM_ASSINATURA_JOSE}}" x="25" y="-5" width="250" height="100" />
          <rect x="0" y="55" width="300" height="1" fill="#ff6b9d"/>
          <text x="150" y="80" class="sans white" font-size="18" text-anchor="middle">José Moraes</text>
          <text x="150" y="100" class="sans soft" font-size="14" text-anchor="middle">Coordenador de Marketing</text>
        </g>
      </g>

      <!-- QR Code -->
      <g transform="translate(870,70)">
        <rect x="0" y="0" width="280" height="280" rx="8" ry="8" fill="#0a0510" stroke="#3d1a33"/>
        <rect x="24" y="24" width="232" height="232" fill="#0f0515" stroke="#ff6b9d"/>
        {{QR_CODE}}
        <text x="140" y="320" class="sans soft" font-size="16" text-anchor="middle">Academy Z</text>
        <text x="140" y="345" class="sans white" font-size="14" text-anchor="middle">Marketing Digital</text>
      </g>

      <!-- Status da campanha -->
      <text x="0" y="805" class="mono muted" font-size="14" font-style="italic">
        // Campanha: Certificado {{PARTICIPANT_NAME}} | Status: ✅ Emitido | Engajamento: 100%
      </text>
    </g>
  </g>
</svg>
