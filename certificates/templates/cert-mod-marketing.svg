<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="1000" viewBox="0 0 1400 1000">
  <defs>
    <linearGradient id="scanMarketing" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" style="stop-color:#ff6b9d;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#c471ed;stop-opacity:0.15" />
    </linearGradient>
    <linearGradient id="borderMarketing" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b9d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c471ed;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1400" height="1000" fill="#ffffff"/>
  <rect width="1400" height="1000" fill="url(#scanMarketing)"/>

  <!-- Border decorativo -->
  <rect x="40" y="40" width="1320" height="920" fill="none" stroke="url(#borderMarketing)" stroke-width="3" rx="10"/>
  <rect x="50" y="50" width="1300" height="900" fill="none" stroke="url(#borderMarketing)" stroke-width="1" rx="8"/>

  <!-- Ícones decorativos de marketing -->
  <g opacity="0.1">
    <circle cx="200" cy="150" r="40" fill="#ff6b9d"/>
    <circle cx="1200" cy="150" r="40" fill="#c471ed"/>
    <circle cx="200" cy="850" r="40" fill="#c471ed"/>
    <circle cx="1200" cy="850" r="40" fill="#ff6b9d"/>
  </g>

  <!-- Header -->
  <text x="700" y="120" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#ff6b9d" text-anchor="middle">ACADEMY Z</text>
  <text x="700" y="155" font-family="Arial, sans-serif" font-size="18" fill="#c471ed" text-anchor="middle">Área: Marketing Digital</text>

  <!-- Title -->
  <text x="700" y="240" font-family="Georgia, serif" font-size="56" font-weight="bold" fill="#2d3748" text-anchor="middle">CERTIFICADO</text>
  <line x1="500" y1="260" x2="900" y2="260" stroke="url(#borderMarketing)" stroke-width="2"/>

  <!-- Corpo do texto -->
  <text x="700" y="320" font-family="Arial, sans-serif" font-size="20" fill="#4a5568" text-anchor="middle">Certificamos que</text>

  <!-- Nome do participante -->
  <text x="700" y="385" font-family="Georgia, serif" font-size="42" font-weight="bold" fill="#2d3748" text-anchor="middle" id="participantName">{{PARTICIPANT_NAME}}</text>
  <line x1="300" y1="400" x2="1100" y2="400" stroke="#ff6b9d" stroke-width="2"/>

  <!-- Texto do curso -->
  <text x="700" y="460" font-family="Arial, sans-serif" font-size="20" fill="#4a5568" text-anchor="middle">concluiu com êxito o curso de</text>

  <!-- Nome do curso -->
  <text x="700" y="520" font-family="Georgia, serif" font-size="36" font-weight="bold" fill="#ff6b9d" text-anchor="middle" id="courseName">{{COURSE_NAME}}</text>

  <!-- Informações do curso -->
  <text x="700" y="580" font-family="Arial, sans-serif" font-size="18" fill="#4a5568" text-anchor="middle">
    com carga horária de <tspan font-weight="bold" fill="#c471ed">{{HOURS}}</tspan>
  </text>
  <text x="700" y="610" font-family="Arial, sans-serif" font-size="18" fill="#4a5568" text-anchor="middle">
    realizado na modalidade <tspan font-weight="bold" fill="#c471ed">{{MODALIDADE}}</tspan>
  </text>

  <!-- Data -->
  <text x="700" y="660" font-family="Arial, sans-serif" font-size="18" fill="#4a5568" text-anchor="middle">
    Emitido em <tspan font-weight="bold">{{COMPLETION_DATE}}</tspan>
  </text>

  <!-- Assinatura -->
  <g transform="translate(700, 750)">
    <line x1="-150" y1="0" x2="150" y2="0" stroke="#2d3748" stroke-width="1"/>
    <text x="0" y="25" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#2d3748" text-anchor="middle">José Moraes</text>
    <text x="0" y="45" font-family="Arial, sans-serif" font-size="14" fill="#718096" text-anchor="middle">Coordenador de Marketing</text>
  </g>

  <!-- QR Code e Verificação -->
  <g id="qrcode" transform="translate(1150, 730)">
    {{QR_CODE}}
  </g>

  <!-- Footer com informações de verificação -->
  <text x="700" y="930" font-family="Arial, sans-serif" font-size="12" fill="#718096" text-anchor="middle">
    Certificado ID: <tspan font-weight="bold" fill="#ff6b9d">{{CERTIFICATE_ID}}</tspan>
  </text>
  <text x="700" y="950" font-family="Arial, sans-serif" font-size="12" fill="#718096" text-anchor="middle">
    Verificação: <tspan fill="#c471ed">academyz.com.br/verificar/{{HASH}}</tspan>
  </text>
</svg>
