<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="1000" viewBox="0 0 1400 1000">
  <defs>
    <linearGradient id="scanDesign" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" style="stop-color:#f093fb;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#f5576c;stop-opacity:0.15" />
    </linearGradient>
    <linearGradient id="borderDesign" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f093fb;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f5576c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#feca57;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1400" height="1000" fill="#ffffff"/>
  <rect width="1400" height="1000" fill="url(#scanDesign)"/>

  <!-- Border criativo -->
  <rect x="40" y="40" width="1320" height="920" fill="none" stroke="url(#borderDesign)" stroke-width="4" rx="15"/>
  <rect x="50" y="50" width="1300" height="900" fill="none" stroke="url(#borderDesign)" stroke-width="1" rx="12" stroke-dasharray="10,5"/>

  <!-- Elementos decorativos geométricos -->
  <g opacity="0.08">
    <polygon points="150,120 180,180 120,180" fill="#f093fb"/>
    <circle cx="1250" cy="150" r="30" fill="#f5576c"/>
    <rect x="150" y="820" width="50" height="50" fill="#feca57" transform="rotate(45 175 845)"/>
    <polygon points="1220,850 1250,910 1190,910" fill="#f093fb" transform="rotate(180 1220 880)"/>
  </g>

  <!-- Header -->
  <text x="700" y="110" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#f5576c" text-anchor="middle">ACADEMY Z</text>
  <text x="700" y="145" font-family="Arial, sans-serif" font-size="18" fill="#f093fb" text-anchor="middle">Área: Design & Criatividade</text>

  <!-- Title -->
  <text x="700" y="235" font-family="Georgia, serif" font-size="58" font-weight="bold" fill="#2d3748" text-anchor="middle">CERTIFICADO</text>
  <line x1="450" y1="255" x2="950" y2="255" stroke="url(#borderDesign)" stroke-width="3"/>

  <!-- Corpo do texto -->
  <text x="700" y="315" font-family="Arial, sans-serif" font-size="20" fill="#4a5568" text-anchor="middle">Certificamos que</text>

  <!-- Nome do participante -->
  <text x="700" y="385" font-family="Georgia, serif" font-size="44" font-weight="bold" fill="#2d3748" text-anchor="middle" id="participantName">{{PARTICIPANT_NAME}}</text>
  <line x1="280" y1="402" x2="1120" y2="402" stroke="#f5576c" stroke-width="2"/>

  <!-- Texto do curso -->
  <text x="700" y="465" font-family="Arial, sans-serif" font-size="20" fill="#4a5568" text-anchor="middle">concluiu com êxito o curso de</text>

  <!-- Nome do curso -->
  <text x="700" y="530" font-family="Georgia, serif" font-size="38" font-weight="bold" fill="#f093fb" text-anchor="middle" id="courseName">{{COURSE_NAME}}</text>

  <!-- Informações do curso -->
  <text x="700" y="595" font-family="Arial, sans-serif" font-size="18" fill="#4a5568" text-anchor="middle">
    com carga horária de <tspan font-weight="bold" fill="#f5576c">{{HOURS}}</tspan>
  </text>
  <text x="700" y="625" font-family="Arial, sans-serif" font-size="18" fill="#4a5568" text-anchor="middle">
    realizado na modalidade <tspan font-weight="bold" fill="#f5576c">{{MODALIDADE}}</tspan>
  </text>

  <!-- Data -->
  <text x="700" y="680" font-family="Arial, sans-serif" font-size="18" fill="#4a5568" text-anchor="middle">
    Emitido em <tspan font-weight="bold">{{COMPLETION_DATE}}</tspan>
  </text>

  <!-- Assinatura -->
  <g transform="translate(700, 760)">
    <line x1="-150" y1="0" x2="150" y2="0" stroke="#2d3748" stroke-width="1"/>
    <text x="0" y="25" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#2d3748" text-anchor="middle">José Moraes</text>
    <text x="0" y="45" font-family="Arial, sans-serif" font-size="14" fill="#718096" text-anchor="middle">Coordenador de Design</text>
  </g>

  <!-- QR Code -->
  <g id="qrcode" transform="translate(1150, 740)">
    {{QR_CODE}}
  </g>

  <!-- Footer -->
  <text x="700" y="930" font-family="Arial, sans-serif" font-size="12" fill="#718096" text-anchor="middle">
    Certificado ID: <tspan font-weight="bold" fill="#f5576c">{{CERTIFICATE_ID}}</tspan>
  </text>
  <text x="700" y="950" font-family="Arial, sans-serif" font-size="12" fill="#718096" text-anchor="middle">
    Verificação: <tspan fill="#f093fb">academyz.com.br/verificar/{{HASH}}</tspan>
  </text>
</svg>
